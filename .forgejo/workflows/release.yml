  lyrical-release-uos-ppa:
    runs-on: ubuntu-dev-resolute
    needs: [create-release, deb-lyrical, jazzy-release-uos-ppa]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
      - name: Push to PPA
        if: startsWith(github.ref, 'refs/tags/')
        env:
          PPA_DEPLOY_KEY: ${{ secrets.PPA_DEPLOY_KEY }}
          SERIES: "resolute"
          DEB_PATH: "artifacts/artifacts-deb-lyrical-*/*.deb"
        run: |
          sleep 120 # ensure previous PPA pushes are processed before and CI did run
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$PPA_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'
          git clone --depth 1 --filter=blob:none --sparse ssh://git@codeberg.org/uos-robotics/ppa.git ppa
          cd ppa
          git sparse-checkout init --cone
          for s in $SERIES; do
            git sparse-checkout set "ubuntu/pool/main/$s"
            mkdir -p "ubuntu/pool/main/$s"
            cp ../$DEB_PATH "ubuntu/pool/main/$s/"
            git add "ubuntu/pool/main/$s/"*.deb || true
          done
          git config --global user.email $(git log -1 --pretty=format:'%ae')
          git config --global user.name $(git log -1 --pretty=format:'%an')
          REPO_NAME="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY}}"
          COMMIT_SHA="${FORGEJO_SHA:-${GITHUB_SHA}}"
          git commit -m "ci: add deb(s) from $REPO_NAME@$COMMIT_SHA" || echo "No changes"
          git push origin pages
          shred -u ~/.ssh/deploy_key || rm -f ~/.ssh/deploy_key
          cd ..

  aur-publish-src:
    runs-on: ubuntu-dev-resolute
    needs: [create-release]
    container:
      image: archlinux:latest
    steps:
      - name: Deps
        run: |
          pacman -Sy --noconfirm openssl openssh git nodejs base-devel
          useradd -m build
          echo "build ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/build
      - uses: actions/checkout@v4
      - name: Update AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p /home/build/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > /home/build/.ssh/aur_key
          chmod 600 /home/build/.ssh/aur_key
          ssh-keyscan aur.archlinux.org >> /home/build/.ssh/known_hosts
          chown -R build:build . /home/build/.ssh

          -u build env \
            GIT_SSH_COMMAND='ssh -i /home/build/.ssh/aur_key -o UserKnownHostsFile=/home/build/.ssh/known_hosts -o StrictHostKeyChecking=yes' \
            FORGEJO_REPOSITORY="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY}}" \
            FORGEJO_SHA="${FORGEJO_SHA:-${GITHUB_SHA}}" \
            bash << 'EOF'
            set -euo pipefail
            git config --global user.email "$(git log -1 --pretty=format:'%ae')"
            git config --global user.name "$(git log -1 --pretty=format:'%an')"
            git clone ssh://aur@aur.archlinux.org/minot.git minot-aur
            cp packaging/arch/PKGBUILD minot-aur/
            cd minot-aur
            makepkg --printsrcinfo > .SRCINFO
            git add -f .SRCINFO PKGBUILD
            git commit -m "Update package from $FORGEJO_REPOSITORY@$FORGEJO_SHA" || echo "No changes"
            git push origin
          EOF
          shred -u /home/build/.ssh/aur_key

