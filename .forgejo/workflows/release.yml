# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
# Release Workflow for Minot. The schema is used until there is one for Forgejo.

name: release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  rust-stable:
    runs-on: ubuntu-dev-resolute
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose

  # -------------------------------------------------------------------------
  # STANDARD LINUX TARGETS (Musl, GNU x86/ARM)
  # Builds: minimal, coord, mt-pubsub
  # -------------------------------------------------------------------------

  linux-x86_64-musl:
    runs-on: ubuntu-dev-resolute
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: apt-get update && apt-get install -y musl-tools
      - name: Build Variants
        env:
          RUST_TARGET: x86_64-unknown-linux-musl
        run: |
          rustup target add $RUST_TARGET
          # Helper alias for static linking
          CARGO_CMD="cargo build --target $RUST_TARGET --profile full-release"
          export RUSTFLAGS="-C target-feature=+crt-static"

          $CARGO_CMD --package minot --bin minot --no-default-features
          mkdir -p dist/min && cp target/$RUST_TARGET/full-release/minot dist/min/

          $CARGO_CMD --package minot --bin minot --features embed-coord
          mkdir -p dist/co && cp target/$RUST_TARGET/full-release/minot dist/co/

          $CARGO_CMD --package minot --bin minot --features embed-coord,embed-mt-pubsub
          mkdir -p dist/rat && cp target/$RUST_TARGET/full-release/minot dist/rat/

          $CARGO_CMD --package minot --bin minot-coord
          $CARGO_CMD --package mt_wind --bin wind-mt-pubsub --features mt_pubsub
          $CARGO_CMD --package mt_wind --bin wind-ros2-native --features ros2-native
          $CARGO_CMD --package mt_rat --lib 

          cp target/$RUST_TARGET/full-release/minot-coord dist/
          cp target/$RUST_TARGET/full-release/wind-mt-pubsub dist/
          cp target/$RUST_TARGET/full-release/wind-ros2-native dist/
          cp target/$RUST_TARGET/full-release/librat.a dist/
          cp mt_rat/rat.h dist/

      - name: "Archive binary"
        run: |
          TARGET=x86_64-unknown-linux-musl
          mv dist minot-$TARGET
          tar czvf minot-$TARGET.tar.gz minot-$TARGET
          shasum -a 256 minot-$TARGET.tar.gz > minot-$TARGET.tar.gz.sha256

      - name: "Upload binary"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-x86_64-unknown-linux-musl
          path: |
            *.tar.gz
            *.sha256

  linux-x86_64-gnu:
    runs-on: ubuntu-dev-resolute
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Build Variants
        env:
          RUST_TARGET: x86_64-unknown-linux-gnu
        run: |
          rustup target add $RUST_TARGET
          CARGO_CMD="cargo build --target $RUST_TARGET --profile full-release"

          $CARGO_CMD --package minot --bin minot --no-default-features
          mkdir -p dist/min && cp target/$RUST_TARGET/full-release/minot dist/min/

          $CARGO_CMD --package minot --bin minot --features embed-coord
          mkdir -p dist/co && cp target/$RUST_TARGET/full-release/minot dist/co/

          $CARGO_CMD --package minot --bin minot --features embed-coord,embed-mt-pubsub
          mkdir -p dist/rat && cp target/$RUST_TARGET/full-release/minot dist/rat/

          $CARGO_CMD --package minot --bin minot-coord
          $CARGO_CMD --package mt_wind --bin wind-mt-pubsub --features mt_pubsub
          $CARGO_CMD --package mt_wind --bin wind-ros2-native --features ros2-native
          $CARGO_CMD --package mt_wind --bin wind-ros1-native --features ros1-native
          $CARGO_CMD --package mt_rat --lib 

          cp target/$RUST_TARGET/full-release/minot-coord dist/
          cp target/$RUST_TARGET/full-release/wind-mt-pubsub dist/
          cp target/$RUST_TARGET/full-release/wind-ros2-native dist/
          cp target/$RUST_TARGET/full-release/wind-ros1-native dist/
          cp target/$RUST_TARGET/full-release/librat.a dist/
          cp target/$RUST_TARGET/full-release/librat.so dist/
          cp mt_rat/rat.h dist/

          # Prepare pkg-config and cmake files
          VERSION="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME}}"
          VERSION="${VERSION#v}"
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/librat.pc > mt_rat/librat.pc.tmp && mv mt_rat/librat.pc.tmp mt_rat/librat.pc
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/libratConfig.cmake > mt_rat/libratConfig.cmake.tmp && mv mt_rat/libratConfig.cmake.tmp mt_rat/libratConfig.cmake

          # Create Debian Package
          cargo deb --package mt_rat --target $RUST_TARGET --no-build --profile full-release
          cargo deb --package minot --target $RUST_TARGET --no-build --profile full-release
          find target/$RUST_TARGET/debian -name "*.deb" -exec cp {} dist/ \;
          find target/$RUST_TARGET/debian -name "*.deb" -exec cp {} . \;

      - name: "Archive binary"
        run: |
          TARGET=x86_64-unknown-linux-gnu
          mv dist minot-$TARGET
          tar czvf minot-$TARGET.tar.gz minot-$TARGET
          shasum -a 256 minot-$TARGET.tar.gz > minot-$TARGET.tar.gz.sha256

      - name: "Upload binary"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-x86_64-unknown-linux-gnu
          path: |
            *.tar.gz
            *.sha256
            *.deb

  linux-aarch64-gnu:
    runs-on: ubuntu-dev-resolute
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: |
          apt-get update && apt-get install -y gcc-aarch64-linux-gnu
      - name: Build Variants
        env:
          RUST_TARGET: aarch64-unknown-linux-gnu
        run: |
          rustup target add $RUST_TARGET
          CARGO_CMD="cargo build --target $RUST_TARGET --profile full-release"

          # Variants
          $CARGO_CMD --package minot --bin minot --no-default-features
          mkdir -p dist/min && cp target/$RUST_TARGET/full-release/minot dist/min/

          $CARGO_CMD --package minot --bin minot --features embed-coord
          mkdir -p dist/co && cp target/$RUST_TARGET/full-release/minot dist/co/

          $CARGO_CMD --package minot --bin minot --features embed-coord,embed-mt-pubsub
          mkdir -p dist/rat && cp target/$RUST_TARGET/full-release/minot dist/rat/

          # Sidecars
          $CARGO_CMD --package minot --bin minot-coord
          $CARGO_CMD --package mt_rat --lib 

          cp target/$RUST_TARGET/full-release/minot-coord dist/
          cp target/$RUST_TARGET/full-release/librat.a dist/
          cp target/$RUST_TARGET/full-release/librat.so dist/
          cp mt_rat/rat.h dist/

          # Prepare pkg-config and cmake files
          VERSION="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME}}"
          VERSION="${VERSION#v}"
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/librat.pc > mt_rat/librat.pc.tmp && mv mt_rat/librat.pc.tmp mt_rat/librat.pc
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/libratConfig.cmake > mt_rat/libratConfig.cmake.tmp && mv mt_rat/libratConfig.cmake.tmp mt_rat/libratConfig.cmake

          # Create Debian Package
          cargo deb --package mt_rat --target $RUST_TARGET --no-build --profile full-release
          cargo deb --package minot --target $RUST_TARGET --no-build --profile full-release
          find target/$RUST_TARGET/debian -name "*.deb" -exec cp {} dist/ \;
          find target/$RUST_TARGET/debian -name "*.deb" -exec cp {} . \;

      - name: "Archive binary"
        run: |
          TARGET=aarch64-unknown-linux-gnu
          mv dist minot-$TARGET
          tar czvf minot-$TARGET.tar.gz minot-$TARGET
          shasum -a 256 minot-$TARGET.tar.gz > minot-$TARGET.tar.gz.sha256

      - name: "Upload binary"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-aarch64-unknown-linux-gnu
          path: |
            *.tar.gz
            *.sha256
            *.deb

  linux-armv7-gnu:
    runs-on: ubuntu-dev-resolute
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: |
          apt-get update && apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build Variants
        env:
          RUST_TARGET: armv7-unknown-linux-gnueabihf
        run: |
          rustup target add $RUST_TARGET
          CARGO_CMD="cargo build --target $RUST_TARGET --profile full-release"

          # Variants
          $CARGO_CMD --package minot --bin minot --no-default-features
          mkdir -p dist/min && cp target/$RUST_TARGET/full-release/minot dist/min/

          $CARGO_CMD --package minot --bin minot --features embed-coord
          mkdir -p dist/co && cp target/$RUST_TARGET/full-release/minot dist/co/

          $CARGO_CMD --package minot --bin minot --features embed-coord,embed-mt-pubsub
          mkdir -p dist/rat && cp target/$RUST_TARGET/full-release/minot dist/rat/

          # Sidecars
          $CARGO_CMD --package minot --bin minot-coord
          $CARGO_CMD --package mt_wind --bin wind-mt-pubsub --features mt_pubsub
          $CARGO_CMD --package mt_rat --lib 

          cp target/$RUST_TARGET/full-release/minot-coord dist/
          cp target/$RUST_TARGET/full-release/wind-mt-pubsub dist/
          cp target/$RUST_TARGET/full-release/librat.a dist/
          cp target/$RUST_TARGET/full-release/librat.so dist/
          cp mt_rat/rat.h dist/

          # Prepare pkg-config and cmake files
          VERSION="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME}}"
          VERSION="${VERSION#v}"
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/librat.pc > mt_rat/librat.pc.tmp && mv mt_rat/librat.pc.tmp mt_rat/librat.pc
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/libratConfig.cmake > mt_rat/libratConfig.cmake.tmp && mv mt_rat/libratConfig.cmake.tmp mt_rat/libratConfig.cmake

          # Create Debian Package
          cargo deb --package mt_rat --target $RUST_TARGET --no-build --profile full-release
          cargo deb --package minot --target $RUST_TARGET --no-build --profile full-release
          find target/$RUST_TARGET/debian -name "*.deb" -exec cp {} dist/ \;
          find target/$RUST_TARGET/debian -name "*.deb" -exec cp {} . \;

      - name: "Archive binary"
        run: |
          TARGET=armv7-unknown-linux-gnueabihf
          mv dist minot-$TARGET
          tar czvf minot-$TARGET.tar.gz minot-$TARGET
          shasum -a 256 minot-$TARGET.tar.gz > minot-$TARGET.tar.gz.sha256

      - name: "Upload binary"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-armv7-unknown-linux-gnueabihf
          path: |
            *.tar.gz
            *.sha256
            *.deb

  ppa-minot-rat-debs:
    runs-on: ubuntu-dev-resolute
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - series: jammy
            image: docker.io/stelzo/ubuntu-dev:jammy
            target: x86_64-unknown-linux-gnu
            apt_deps: ""
          - series: jammy
            image: docker.io/stelzo/ubuntu-dev:jammy
            target: aarch64-unknown-linux-gnu
            apt_deps: "gcc-aarch64-linux-gnu"
          - series: jammy
            image: docker.io/stelzo/ubuntu-dev:jammy
            target: armv7-unknown-linux-gnueabihf
            apt_deps: "gcc-arm-linux-gnueabihf"
          - series: noble
            image: docker.io/stelzo/ubuntu-dev:noble
            target: x86_64-unknown-linux-gnu
            apt_deps: ""
          - series: noble
            image: docker.io/stelzo/ubuntu-dev:noble
            target: aarch64-unknown-linux-gnu
            apt_deps: "gcc-aarch64-linux-gnu"
          - series: noble
            image: docker.io/stelzo/ubuntu-dev:noble
            target: armv7-unknown-linux-gnueabihf
            apt_deps: "gcc-arm-linux-gnueabihf"
          - series: resolute
            image: docker.io/stelzo/ubuntu-dev:resolute
            target: x86_64-unknown-linux-gnu
            apt_deps: ""
          - series: resolute
            image: docker.io/stelzo/ubuntu-dev:resolute
            target: aarch64-unknown-linux-gnu
            apt_deps: "gcc-aarch64-linux-gnu"
          - series: resolute
            image: docker.io/stelzo/ubuntu-dev:resolute
            target: armv7-unknown-linux-gnueabihf
            apt_deps: "gcc-arm-linux-gnueabihf"
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Build native PPA debs
        env:
          RUST_TARGET: ${{ matrix.target }}
          APT_DEPS: ${{ matrix.apt_deps }}
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ca-certificates curl openssl build-essential pkg-config git $APT_DEPS
          rustup target add "$RUST_TARGET"

          CARGO_CMD="cargo build --target $RUST_TARGET --profile full-release"
          $CARGO_CMD --package minot --bin minot --features embed-coord,embed-mt-pubsub
          $CARGO_CMD --package minot --bin minot-coord
          $CARGO_CMD --package mt_rat --lib

          VERSION="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME}}"
          VERSION="${VERSION#v}"
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/librat.pc > mt_rat/librat.pc.tmp
          mv mt_rat/librat.pc.tmp mt_rat/librat.pc
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/libratConfig.cmake > mt_rat/libratConfig.cmake.tmp
          mv mt_rat/libratConfig.cmake.tmp mt_rat/libratConfig.cmake

          cargo deb --package mt_rat --target "$RUST_TARGET" --no-build --profile full-release
          cargo deb --package minot --target "$RUST_TARGET" --no-build --profile full-release
          find "target/$RUST_TARGET/debian" -name "*.deb" -exec cp {} . \;
      - name: "Upload PPA debs"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-ppa-minot-rat-${{ matrix.series }}-${{ matrix.target }}
          path: |
            *.deb

  # -------------------------------------------------------------------------
  # MACOS TARGETS
  # Builds: minimal, coord, mt_pubsub
  # -------------------------------------------------------------------------

  macos-aarch64:
    runs-on: macos-latest
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Build Variants
        env:
          RUST_TARGET: aarch64-apple-darwin
        run: |
          rustup target add $RUST_TARGET
          CARGO_CMD="cargo build --target $RUST_TARGET --profile full-release"

          $CARGO_CMD --package minot --bin minot --no-default-features
          mkdir -p dist/min && cp target/$RUST_TARGET/full-release/minot dist/min/

          $CARGO_CMD --package minot --bin minot --features embed-coord
          mkdir -p dist/co && cp target/$RUST_TARGET/full-release/minot dist/co/

          $CARGO_CMD --package minot --bin minot --features embed-coord,embed-mt-pubsub
          mkdir -p dist/rat && cp target/$RUST_TARGET/full-release/minot dist/rat/

          $CARGO_CMD --package minot --bin minot-coord
          $CARGO_CMD --package mt_wind --bin wind-mt-pubsub --features mt_pubsub
          $CARGO_CMD --package mt_wind --bin wind-ros2-native --features ros2-native
          $CARGO_CMD --package mt_wind --bin wind-ros1-native --features ros1-native
          $CARGO_CMD --package mt_rat --lib 

          cp target/$RUST_TARGET/full-release/minot-coord dist/
          cp target/$RUST_TARGET/full-release/wind-mt-pubsub dist/
          cp target/$RUST_TARGET/full-release/wind-ros2-native dist/
          cp target/$RUST_TARGET/full-release/wind-ros1-native dist/
          cp target/$RUST_TARGET/full-release/librat.a dist/
          cp target/$RUST_TARGET/full-release/librat.dylib dist/
          cp mt_rat/rat.h dist/

          # Prepare pkg-config and cmake files
          VERSION="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME}}"
          VERSION="${VERSION#v}"
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/librat.pc > dist/librat.pc
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g" mt_rat/libratConfig.cmake > dist/libratConfig.cmake

      - name: "Archive binary"
        run: |
          TARGET=aarch64-apple-darwin
          mv dist minot-$TARGET
          tar czvf minot-$TARGET.tar.gz minot-$TARGET
          shasum -a 256 minot-$TARGET.tar.gz > minot-$TARGET.tar.gz.sha256

      - name: "Upload binary"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-aarch64-apple-darwin
          path: |
            *.tar.gz
            *.sha256

  # -------------------------------------------------------------------------
  # ROS TARGETS (Lyrical / Jazzy / Humble)
  # Builds: minimal, coord, mt_pubsub AND ros2, wind-ros2
  # -------------------------------------------------------------------------

  jazzy-linux-x86_64-gnu:
    runs-on: ubuntu-dev-resolute
    container:
      image: docker.io/stelzo/ubuntu-dev:jazzy
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: |
          apt-get install -y curl git openssl unzip clang
          apt-get update --assume-yes && apt-get install locales --assume-yes
          locale-gen en_US en_US.UTF-8
          export LANG=en_US.UTF-8
          apt-get install software-properties-common --assume-yes
          # ROS2 Jazzy
          add-apt-repository universe -y
          apt-get update --assume-yes
          curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | tee /etc/apt/sources.list.d/ros2.list > /dev/null
          apt-get update --assume-yes && apt-get install ros-dev-tools ros-jazzy-ros-base --assume-yes

      - name: Build Variants
        env:
          RUST_TARGET: x86_64-unknown-linux-gnu
        run: |
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          source /opt/ros/jazzy/setup.bash
          rustup target add $RUST_TARGET
          CARGO_CMD="cargo build --target $RUST_TARGET --profile full-release"

          # Feature: embed-ros2-c
          $CARGO_CMD --package minot --bin minot --features embed-coord,embed-ros2-c
          mkdir -p dist/ros2 && cp target/$RUST_TARGET/full-release/minot dist/ros2/

          $CARGO_CMD --package mt_wind --bin wind-ros2-c --features ros2-c
          $CARGO_CMD --package minot --bin minot-coord

          # Copy root artifacts
          cp target/$RUST_TARGET/full-release/wind-ros2-c dist/

      - name: "Archive binary"
        run: |
          TARGET=x86_64-unknown-linux-gnu
          mv dist minot-jazzy-$TARGET
          tar czvf minot-jazzy-$TARGET.tar.gz minot-jazzy-$TARGET
          shasum -a 256 minot-jazzy-$TARGET.tar.gz > minot-jazzy-$TARGET.tar.gz.sha256

      - name: "Upload binary"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-jazzy-x86_64-unknown-linux-gnu
          path: |
            *.tar.gz
            *.sha256

  deb-jazzy-amd64:
    runs-on: ubuntu-dev-resolute
    container:
      image: docker.io/stelzo/ubuntu-dev:jazzy
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: |
          apt-get install -y curl git openssl unzip clang
          apt-get update --assume-yes && apt-get install locales --assume-yes
          locale-gen en_US en_US.UTF-8
          export LANG=en_US.UTF-8
          apt-get install software-properties-common --assume-yes
          # ROS2 Jazzy
          add-apt-repository universe -y
          apt-get update --assume-yes
          curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | tee /etc/apt/sources.list.d/ros2.list > /dev/null
          apt-get update --assume-yes && apt-get install ros-dev-tools ros-jazzy-ros-base --assume-yes
          if [ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]; then
            rosdep init
          fi
          rosdep update

      - name: Build
        run: |
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          source /opt/ros/jazzy/setup.bash
          bash ./scripts/make-deb.bash

      - name: "Upload deb"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-deb-jazzy-amd64
          path: |
            *.deb

  deb-jazzy-arm64:
    runs-on: ubuntu-latest-arm
    container:
      image: docker.io/stelzo/ubuntu-dev:jazzy
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: |
          apt-get install -y curl git openssl unzip clang
          apt-get update --assume-yes && apt-get install locales --assume-yes
          locale-gen en_US en_US.UTF-8
          export LANG=en_US.UTF-8
          apt-get install software-properties-common --assume-yes
          # ROS2 Jazzy
          add-apt-repository universe -y
          apt-get update --assume-yes
          curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | tee /etc/apt/sources.list.d/ros2.list > /dev/null
          apt-get update --assume-yes && apt-get install ros-dev-tools ros-jazzy-ros-base --assume-yes
          if [ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]; then
            rosdep init
          fi
          rosdep update

      - name: Build
        run: |
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          source /opt/ros/jazzy/setup.bash
          bash ./scripts/make-deb.bash

      - name: "Upload deb"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-deb-jazzy-arm
          path: |
            *.deb

  deb-lyrical:
    runs-on: ${{ matrix.runner }}
    container:
      image: docker.io/stelzo/ubuntu-dev:lyrical
    needs: [rust-stable]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-latest-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          set -euo pipefail
          ulimit -n 65536
          apt-get update
          apt-get install -y openssl
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          source /opt/ros/lyrical/setup.bash
          bash ./scripts/make-deb.bash

      - name: "Upload deb"
        uses: actions/upload-artifact@v3
        with:
          name: artifacts-deb-lyrical-${{ matrix.arch }}
          path: |
            *.deb

  deb-humble-amd64:
    runs-on: ubuntu-dev-resolute
    container:
      image: docker.io/stelzo/ubuntu-dev:humble
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Dependencies
        run: |
          apt-get install -y curl git openssl unzip clang
          apt-get update --assume-yes && apt-get install locales --assume-yes
          locale-gen en_US en_US.UTF-8
          export LANG=en_US.UTF-8
          apt-get install software-properties-common --assume-yes
          # ROS2 Humble
          add-apt-repository universe -y
          apt-get update --assume-yes
          curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | tee /etc/apt/sources.list.d/ros2.list > /dev/null
          apt-get update --assume-yes && apt-get install ros-dev-tools ros-humble-ros-base --assume-yes
          if [ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]; then
            rosdep init
          fi
          rosdep update

      - name: Build
        run: |
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          source /opt/ros/humble/setup.bash
          bash ./scripts/make-deb.bash

      - name: "Upload deb"
        uses: actions/upload-artifact@v3
