            fi
            cp "${debs[@]}" "ubuntu/pool/main/$s/"
            git add "ubuntu/pool/main/$s/"*.deb || true
          done
          git config --global user.email $(git log -1 --pretty=format:'%ae')
          git config --global user.name $(git log -1 --pretty=format:'%an')
          REPO_NAME="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY}}"
          COMMIT_SHA="${FORGEJO_SHA:-${GITHUB_SHA}}"
          git commit -m "ci: add deb(s) from $REPO_NAME@$COMMIT_SHA" || echo "No changes"
          git push origin pages
          shred -u ~/.ssh/deploy_key || rm -f ~/.ssh/deploy_key
          cd ..
