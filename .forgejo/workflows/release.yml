  generate-manifest:
    runs-on: ubuntu-dev-resolute
    needs:
      [
        macos-aarch64,
        linux-x86_64-musl,
        linux-aarch64-gnu,
        linux-armv7-gnu,
        linux-x86_64-gnu,
        jazzy-linux-x86_64-gnu,
        humble-linux-x86_64-gnu,
        humble-linux-aarch64-gnu,
        jazzy-linux-aarch64-gnu,
      ]
    steps:
      - name: Generate feature manifest
        run: |
          cat > manifest.json <<'EOF'
          {
            "description": "Feature manifest for Minot releases. Each archive contains minot variants in subdirectories and shared artifacts in root.",
            "subdirs": {
              "min": "Minimal (no embeds)",
              "co": "Coord only (embed-coord)",
              "rat": "Coord + mt_pubsub (embed-coord, embed-mt-pubsub)",
              "ros2": "Coord + ROS2-C (embed-coord, embed-ros2-c or embed-ros2-c-humble)",
              "ros2_1": "Coord + ROS2-C + ROS1 (embed-coord, embed-ros2-c-humble, embed-ros1-native)"
            },
            "targets": {
              "minot-x86_64-unknown-linux-musl": {
                "subdirs": ["min", "co", "rat"],
                "features": ["embed-coord", "embed-mt-pubsub"],
                "root_artifacts": ["minot-coord", "wind-mt-pubsub", "wind-ros2-native", "librat.a", "rat.h"]
              },
              "minot-x86_64-unknown-linux-gnu": {
                "subdirs": ["min", "co", "rat"],
                "features": ["embed-coord", "embed-mt-pubsub"],
                "root_artifacts": ["minot-coord", "wind-mt-pubsub", "wind-ros2-native", "wind-ros1-native", "librat.a", "librat.so", "rat.h"]
              },
              "minot-aarch64-unknown-linux-gnu": {
                "subdirs": ["min", "co", "rat"],
                "features": ["embed-coord", "embed-mt-pubsub"],
                "root_artifacts": ["minot-coord", "wind-mt-pubsub", "wind-ros2-native", "wind-ros1-native", "librat.a", "librat.so", "rat.h"]
              },
              "minot-armv7-unknown-linux-gnueabihf": {
                "subdirs": ["min", "co", "rat"],
                "features": ["embed-coord", "embed-mt-pubsub"],
                "root_artifacts": ["minot-coord", "wind-mt-pubsub", "librat.a", "librat.so", "rat.h"]
              },
              "minot-aarch64-apple-darwin": {
                "subdirs": ["min", "co", "rat"],
                "features": ["embed-coord", "embed-mt-pubsub"],
                "root_artifacts": ["minot-coord", "wind-mt-pubsub", "wind-ros2-native", "wind-ros1-native", "librat.a", "librat.dylib", "rat.h"]
              },
              "minot-jazzy-x86_64-unknown-linux-gnu": {
                "subdirs": ["ros2"],
                "features": ["embed-coord", "embed-ros2-c"],
                "ros_distro": "jazzy",
                "root_artifacts": ["wind-ros2-c"],
                "requires_base_target": "minot-x86_64-unknown-linux-gnu"
              },
              "minot-jazzy-aarch64-unknown-linux-gnu": {
                "subdirs": ["ros2"],
                "features": ["embed-coord", "embed-ros2-c"],
                "ros_distro": "jazzy",
                "root_artifacts": ["wind-ros2-c"],
                "requires_base_target": "minot-aarch64-unknown-linux-gnu"
              },
              "minot-humble-x86_64-unknown-linux-gnu": {
                "subdirs": ["ros2", "ros2_1"],
                "features": ["embed-coord", "embed-ros2-c-humble", "embed-ros1-native"],
                "ros_distro": "humble",
                "root_artifacts": ["wind-ros2-c", "wind-ros1-native"],
                "requires_base_target": "minot-x86_64-unknown-linux-gnu"
              },
              "minot-humble-aarch64-unknown-linux-gnu": {
                "subdirs": ["ros2", "ros2_1"],
                "features": ["embed-coord", "embed-ros2-c-humble", "embed-ros1-native"],
                "ros_distro": "humble",
                "root_artifacts": ["wind-ros2-c", "wind-ros1-native"],
                "requires_base_target": "minot-aarch64-unknown-linux-gnu"
              }
            }
          }
          EOF
          cat manifest.json
      - name: Upload manifest
        uses: actions/upload-artifact@v3
        with:
          name: manifest
          path: manifest.json

  linux-pypi:
    runs-on: ubuntu-dev-resolute
    needs: [rust-stable]
    strategy:
      matrix:
        # omitting ppc64le and s390x since they do not compile and probably have other problems than running this software
        target:
          - x86_64-unknown-linux-gnu
          - i686-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        env:
          # Manually define ARM architecture for ring 0.17+ on older GCC
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ulimit -n 65536
          rustup target add "$TARGET"
          maturin build --zig --manifest-path minot/Cargo.toml --profile full-release --target-dir wheels --target "$TARGET"
      - name: Upload wheels
        uses: actions/upload-artifact@v3
        with:
          name: wheels
          path: target/wheels

  musllinux-pypi:
    runs-on: ubuntu-dev-resolute
    needs: [rust-stable]
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ulimit -n 65536
          rustup target add "$TARGET"
          maturin build --zig --manifest-path minot/Cargo.toml --profile full-release --target-dir wheels --target "$TARGET"
      - name: Upload wheels
        uses: actions/upload-artifact@v3
        with:
          name: wheels
          path: target/wheels

  macos-pypi:
    runs-on: ${{ matrix.platform.runner }}
    needs: [rust-stable]
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        env:
          TARGET: ${{ matrix.platform.target }}
        run: |
          set -euo pipefail
          rustup target add "$TARGET"
          maturin build --manifest-path minot/Cargo.toml --profile full-release --target-dir wheels --target "$TARGET"
      - name: Upload wheels
        uses: actions/upload-artifact@v3
        with:
          name: wheels
          path: target/wheels

  # Source distribution, pip will try to build from source.
  sdist-pypi:
    runs-on: ubuntu-dev-resolute
    needs: [rust-stable]
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: |
          set -euo pipefail
          maturin sdist --manifest-path minot/Cargo.toml --out target/wheels
      - name: Upload sdist
        uses: actions/upload-artifact@v3
        with:
          name: wheels
          path: target/wheels

  create-release:
    runs-on: ubuntu-dev-resolute
    needs:
      [
        generate-manifest,
        deb-humble-amd64,
        deb-humble-arm64,
        deb-jazzy-amd64,
        deb-jazzy-arm64,
        deb-lyrical,
        linux-pypi,
        musllinux-pypi,
        macos-pypi,
        sdist-pypi,
      ]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
      - name: List downloaded artifacts (for verification)
        run: ls -R artifacts
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME}}"
          REPO="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY}}"
          SERVER="${FORGEJO_SERVER_URL:-https://codeberg.org}"

          tea login add --name codeberg --url "${SERVER}" --token "${GITHUB_TOKEN}"
          tea release delete --repo "${REPO}" --confirm "${TAG}" || true

          ASSET_FLAGS=""
          while IFS= read -r f; do
            ASSET_FLAGS="${ASSET_FLAGS} --asset ${f}"
          done <<EOF
          $(find artifacts -type f | sort)
          EOF

          tea release create \
            --login codeberg \
            --repo "${REPO}" \
            --tag "${TAG}" \
            --title "${TAG}" \
            --note "Release ${TAG}

          ### Artifacts
          - Binary archives for Linux and macOS
          - Debian packages published to the UOS PPA
          - Python wheels published to PyPI" \
            ${ASSET_FLAGS}

  publish-pypi:
    needs:
      - create-release
    runs-on: ubuntu-dev-resolute
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download wheels and sdist
        uses: actions/download-artifact@v3
        with:
          name: wheels
          path: dist
      - name: Get twine
        run: uv tool install twine
      - name: Publish to PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          set -euo pipefail

          echo "=== Python distributions to publish ==="
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) -print -exec ls -lh {} \;

          twine upload \
            --username __token__ \
            --password "${PYPI_TOKEN}" \
            --non-interactive \
            --skip-existing \
            --verbose \
            $(find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) | sort)

          echo "Published to PyPI."

  humble-release-uos-ppa:
    runs-on: ubuntu-dev-resolute
    needs: [create-release, deb-humble-arm64, deb-humble-amd64]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
      - name: Push to PPA
        if: startsWith(github.ref, 'refs/tags/')
        env:
          PPA_DEPLOY_KEY: ${{ secrets.PPA_DEPLOY_KEY }}
          SERIES: "jammy"
          DEB_PATH: "artifacts/artifacts-deb-humble-*/*.deb"
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$PPA_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'
          git clone --depth 1 --filter=blob:none --sparse ssh://git@codeberg.org/uos-robotics/ppa.git ppa
          cd ppa
          git sparse-checkout init --cone
          for s in $SERIES; do
            git sparse-checkout set "ubuntu/pool/main/$s"
            mkdir -p "ubuntu/pool/main/$s"
            cp ../$DEB_PATH "ubuntu/pool/main/$s/"
            git add "ubuntu/pool/main/$s/"*.deb || true
          done
          git config --global user.email $(git log -1 --pretty=format:'%ae')
          git config --global user.name $(git log -1 --pretty=format:'%an')
          REPO_NAME="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY}}"
          COMMIT_SHA="${FORGEJO_SHA:-${GITHUB_SHA}}"
          git commit -m "ci: add deb(s) from $REPO_NAME@$COMMIT_SHA" || echo "No changes"
          git push origin pages
          shred -u ~/.ssh/deploy_key || rm -f ~/.ssh/deploy_key
          cd ..

  jazzy-release-uos-ppa:
    runs-on: ubuntu-dev-resolute
    needs:
      [create-release, deb-jazzy-arm64, deb-jazzy-amd64, humble-release-uos-ppa]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
      - name: Push to PPA
        if: startsWith(github.ref, 'refs/tags/')
        env:
          PPA_DEPLOY_KEY: ${{ secrets.PPA_DEPLOY_KEY }}
          SERIES: "noble"
          DEB_PATH: "artifacts/artifacts-deb-jazzy-*/*.deb"
        run: |
          sleep 120 # ensure previous PPA pushes are processed before and CI did run
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$PPA_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'
          git clone --depth 1 --filter=blob:none --sparse ssh://git@codeberg.org/uos-robotics/ppa.git ppa
          cd ppa
          git sparse-checkout init --cone
          for s in $SERIES; do
            git sparse-checkout set "ubuntu/pool/main/$s"
            mkdir -p "ubuntu/pool/main/$s"
            cp ../$DEB_PATH "ubuntu/pool/main/$s/"
            git add "ubuntu/pool/main/$s/"*.deb || true
          done
          git config --global user.email $(git log -1 --pretty=format:'%ae')
          git config --global user.name $(git log -1 --pretty=format:'%an')
          REPO_NAME="${FORGEJO_REPOSITORY:-${GITHUB_REPOSITORY}}"
          COMMIT_SHA="${FORGEJO_SHA:-${GITHUB_SHA}}"
          git commit -m "ci: add deb(s) from $REPO_NAME@$COMMIT_SHA" || echo "No changes"
          git push origin pages
          shred -u ~/.ssh/deploy_key || rm -f ~/.ssh/deploy_key
