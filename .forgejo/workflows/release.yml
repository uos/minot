  homebrew-publish:
    runs-on: ubuntu-dev-resolute
    needs: [create-release]
    steps:
      - uses: actions/checkout@v4
      - name: Download macOS artifact
        uses: actions/download-artifact@v3
        with:
          name: artifacts-aarch64-apple-darwin
      - name: Compute checksum and update formula
        run: |
          VERSION="${FORGEJO_REF_NAME:-${GITHUB_REF_NAME}}"
          VERSION="${VERSION#v}"
          ARM_SHA=$(sha256sum minot-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          sed "s/VERSION_PLACEHOLDER/${VERSION}/g; \
               s/ARM_SHA256_PLACEHOLDER/${ARM_SHA}/g" \
            packaging/homebrew/minot.rb > minot.rb
      - name: Push to Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'
          git clone --depth 1 git@github.com:uos/homebrew-minot.git tap
          mkdir -p tap/Formula
          cp minot.rb tap/Formula/minot.rb
          cd tap
          git config user.email "stelzo@steado.de"
          git config user.name "stelzo"
          git add Formula/minot.rb
          git commit -m "Update minot to ${FORGEJO_REF_NAME:-${GITHUB_REF_NAME}}" || echo "No changes"
          git push origin main
          shred -u ~/.ssh/deploy_key || rm -f ~/.ssh/deploy_key

  publish-crates:
    needs:
      - create-release
    runs-on: ubuntu-dev-resolute
    steps:
      - uses: actions/checkout@v4
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if ! output=$(cargo publish 2>&1); then
            echo "$output"
            echo "$output" | grep -q "already exists" || exit 1
            echo "Version already published, skipping."
          fi

  minot-rat-release-uos-ppa:
    runs-on: ubuntu-dev-resolute
    needs: [lyrical-release-uos-ppa, ppa-minot-rat-debs]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: ppa-debs
      - name: Push to PPA
        if: startsWith(github.ref, 'refs/tags/')
        env:
          PPA_DEPLOY_KEY: ${{ secrets.PPA_DEPLOY_KEY }}
          SERIES: "jammy noble resolute"
        run: |
          sleep 120 # ensure previous PPA pushes are processed before and CI did run
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$PPA_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts -o StrictHostKeyChecking=yes'
          git clone --depth 1 --filter=blob:none --sparse ssh://git@codeberg.org/uos-robotics/ppa.git ppa
          cd ppa
          git sparse-checkout init --cone
          git sparse-checkout set ubuntu/pool/main/jammy ubuntu/pool/main/noble ubuntu/pool/main/resolute
          for s in $SERIES; do
            mkdir -p "ubuntu/pool/main/$s"
            mapfile -t debs < <(find ../ppa-debs -path "../ppa-debs/artifacts-ppa-minot-rat-$s-*/*.deb" -type f)
            if [ "${#debs[@]}" -eq 0 ]; then
              echo "No PPA debs found for $s"
